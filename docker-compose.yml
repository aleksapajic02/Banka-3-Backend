services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10

  gateway:
    container_name: gateway
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    ports:
      - "8080:8080"
    # depends_on:
    # TODO: healthcheck on other microservices

  user:
    container_name: user
    build:
      context: .
      dockerfile: cmd/user/Dockerfile
    ports:
      - "${USER_GRPC_PORT:-50051}:50051"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      ACCESS_JWT_SECRET: ${ACCESS_JWT_SECRET}
      REFRESH_JWT_SECRET: ${REFRESH_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  notification:
    container_name: notification
    build:
      context: .
      dockerfile: cmd/notification/Dockerfile
    ports:
      - "${NOTIFICATION_GRPC_PORT:-50052}:50051"
    environment:
      GRPC_PORT: "50051"
      FROM_EMAIL: "${FROM_EMAIL}"
      FROM_EMAIL_PASSWORD: "${FROM_EMAIL_PASSWORD}"
      FROM_EMAIL_SMTP: "${FROM_EMAIL_SMTP}"
      SMTP_ADDR: "${SMTP_ADDR}"

volumes:
  pgdata:
